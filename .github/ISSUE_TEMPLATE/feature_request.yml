name: Feature Request
description: Suggest a new capability or improvement for mlxlab.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case first, not just the API shape.
      placeholder: I want to use mlxlab for...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like the library to provide?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Existing MLX, NumPy, SciPy, or custom-workaround approaches you tried.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - integrate
        - linalg
        - signal
        - random
        - docs
        - benchmarks
        - packaging / tooling
    validations:
      required: true
