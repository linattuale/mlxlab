name: Bug Report
description: Report a correctness issue, crash, or documentation problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
      placeholder: A short summary of the issue.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: Please include the smallest snippet or input that reproduces the issue.
      render: python
    validations:
      required: true

  - type: input
    id: mlxlab_version
    attributes:
      label: mlxlab version
      placeholder: "0.1.1"
    validations:
      required: true

  - type: input
    id: mlx_version
    attributes:
      label: MLX version
      placeholder: "0.31.1"
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: macOS / chip
      placeholder: "macOS 15.x on M3 Max"
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Extra context
      description: Benchmarks, traces, screenshots, or links if helpful.
